name: Release

on:
  push:
    tags:
      - 'v*'

# Both jobs share the same release; whichever finishes first creates it,
# the second one appends its artifact.
permissions:
  contents: write

jobs:
  # ── .deb package ─────────────────────────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            libglfw3-dev libglew-dev libglm-dev \
            libcurl4-openssl-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            nlohmann-json3-dev \
            libsqlite3-dev \
            zenity

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package .deb
        run: |
          cd build
          cpack -G DEB
          ls -lh *.deb

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
          generate_release_notes: true

  # ── AppImage ──────────────────────────────────────────────────────────────────
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            libglfw3-dev libglew-dev libglm-dev \
            libcurl4-openssl-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            nlohmann-json3-dev \
            libsqlite3-dev \
            zenity \
            patchelf \
            imagemagick

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Install into AppDir
        run: DESTDIR="$GITHUB_WORKSPACE/AppDir" cmake --install build

      - name: Prepare icon
        run: |
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          if [ -f packaging/rammb-neovis.png ]; then
            cp packaging/rammb-neovis.png AppDir/rammb-neovis.png
          else
            convert -size 256x256 xc:#1a3a5c \
              -fill white -font DejaVu-Sans-Bold -pointsize 30 -gravity Center \
              -annotate 0 "RAMMB\nNEOVIS" \
              AppDir/rammb-neovis.png
          fi
          cp AppDir/rammb-neovis.png \
             AppDir/usr/share/icons/hicolor/256x256/apps/rammb-neovis.png

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          # Extract so it runs without FUSE (unavailable in most CI environments)
          ./linuxdeploy-x86_64.AppImage --appimage-extract
          mv squashfs-root linuxdeploy-squashfs

      - name: Build AppImage
        env:
          VERSION: ${{ github.ref_name }}
          # Suppress AppImage runtime's need for FUSE
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          linuxdeploy-squashfs/usr/bin/linuxdeploy \
            --appdir AppDir \
            --executable build/rammb-neovis \
            --desktop-file build/rammb-neovis.desktop \
            --icon-file AppDir/rammb-neovis.png \
            --output appimage

          # Rename to versioned filename
          APPIMG=$(ls RAMMB*.AppImage *.AppImage 2>/dev/null | head -1)
          mv "$APPIMG" "rammb-neovis-${VERSION}-linux-x86_64.AppImage"
          ls -lh rammb-neovis-*.AppImage

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v2
        with:
          files: rammb-neovis-*.AppImage
          generate_release_notes: false
